<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart AI Customer Support</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <h1>Smart AI Customer Support</h1>
          <p>Ask your support question and get a fast AI response.</p>
        </div>
        <button id="load-history" type="button">Load History</button>
      </header>

      <main class="chat-panel">
        <div class="status-row">
          <span id="status">Initializing...</span>
        </div>
        <div class="message-list" id="messages"></div>
        <div class="error-box" id="error-box" style="display:none"></div>

        <div class="input-area">
          <textarea
            id="message-input"
            placeholder="Write your message here..."
            rows="4"
          ></textarea>
          <button id="send-button" type="button">Send</button>
        </div>
      </main>
    </div>

    <script src="app.js"></script>
  </body>
</html>
